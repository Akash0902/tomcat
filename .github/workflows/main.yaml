name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Environment Prep (Self-hosted runners keep state, so we update and install)
      - name: Install Maven
        run: |
          sudo apt update
          sudo apt install -y maven

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # 2. Build & Analysis
      - name: Build, Test & Sonar Scan
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 3. Docker Build (Using a variable for the image name to keep it clean)
      - name: Build Docker Image
        run: docker build -t tomcat-app:latest .

      # 4. Login to Nexus (Crucial: Explicitly include the URL)
      - name: Login to Nexus
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login ${{ secrets.NEXUS_URL }} \
            -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

      # 5. Tag and Push
      # Note: The tag MUST include the Nexus URL for Docker to know where to push.
      - name: Push to Nexus
        run: |
          docker tag tomcat-app:latest ${{ secrets.NEXUS_URL }}/tomcat-app:latest
          docker push ${{ secrets.NEXUS_URL }}/tomcat-app:latest

      # 6. Optional: Cleanup local images to save disk space on self-hosted runner
      - name: Post-Build Cleanup
        if: always()
        run: |
          docker rmi tomcat-app:latest || true
          docker rmi ${{ secrets.NEXUS_URL }}/tomcat-app:latest || true
