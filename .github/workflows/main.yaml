name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ... (Maven and Java steps remain the same) ...

      # 1. Build Docker Image with a Version Tag
      # Using GITHUB_RUN_NUMBER creates tags like v1, v2, v3...
      - name: Build Docker Image
        run: |
          docker build -t tomcat-app:${{ github.run_number }} .
          docker tag tomcat-app:${{ github.run_number }} tomcat-app:latest

      # 2. Login to Nexus
      - name: Login to Nexus
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login ${{ secrets.NEXUS_URL }} \
            -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

      # 3. Tag and Push both Versioned and Latest
      - name: Push to Nexus
        run: |
          # Push the specific version (e.g., tomcat-app:42)
          docker tag tomcat-app:${{ github.run_number }} ${{ secrets.NEXUS_URL }}/tomcat-app:${{ github.run_number }}
          docker push ${{ secrets.NEXUS_URL }}/tomcat-app:${{ github.run_number }}
          
          # Also update 'latest' in Nexus so your deployment always pulls the newest one
          docker tag tomcat-app:${{ github.run_number }} ${{ secrets.NEXUS_URL }}/tomcat-app:latest
          docker push ${{ secrets.NEXUS_URL }}/tomcat-app:latest

      # 4. Cleanup
      - name: Post-Build Cleanup
        if: always()
        run: |
          docker rmi tomcat-app:${{ github.run_number }} || true
          docker rmi ${{ secrets.NEXUS_URL }}/tomcat-app:${{ github.run_number }} || true
