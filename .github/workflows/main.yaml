name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build with Maven
      run: mvn clean install

    - name: Run Unit Tests
      run: mvn test

    - name: Build and Sonar Scan
      run: mvn clean verify sonar:sonar \
           -Dsonar.host.url=http://YOUR_SONAR_SERVER:9000 \
           -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    - name: Build Docker Image
      run: docker build -t tomcat:latest .

    - name: Tag Docker Image
      run: |
        docker tag tomcat:latest ${{ secrets.NEXUS_URL }}/tomcat/tomcat:latest

    - name: Login to Nexus
      run: |
        docker login ${{ secrets.NEXUS_URL }} \
        -u ${{ secrets.NEXUS_USERNAME }} \
        -p ${{ secrets.NEXUS_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.NEXUS_URL }}/tomcat/tomcat:latest
