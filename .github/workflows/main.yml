name: CI - Maven + Tests + Sonar + Docker + Nexus (Self-Hosted)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================
  # 1. CI JOB (PR SAFE – NO SECRETS, NO PUSH)
  # =========================================================
  ci:
    name: Build & Tests (PR Safe)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Unit Tests
        run: mvn -B -ntp test

      - name: Functional Tests
        run: mvn -B -ntp verify -Pfunctional

      - name: Performance Tests
        run: mvn -B -ntp verify -Pperformance

      - name: Package
        run: mvn -B -ntp -DskipTests package

  # =========================================================
  # 2. RELEASE JOB (SELF-HOSTED, SECRETS, PUSH)
  # =========================================================
  release:
    name: Release (Sonar + Docker Push)
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]

    environment:
      name: release   # approval gate

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.SONAR_TOKEN }}"
          echo "::add-mask::${{ secrets.NEXUS_PASSWORD }}"

      - name: Unit Tests
        run: mvn -B -ntp test

      - name: Functional Tests
        run: mvn -B -ntp verify -Pfunctional

      - name: Performance Tests
        run: mvn -B -ntp verify -Pperformance

      - name: Package
        run: mvn -B -ntp -DskipTests package

      # -----------------------------
      # SONAR SCAN
      # -----------------------------
      - name: SonarQube Scan
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B -ntp sonar:sonar \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.projectKey=${SONAR_PROJECT_KEY}

      # -----------------------------
      # DOCKER BUILD & PUSH (NEXUS)
      # -----------------------------
      - name: Docker Login (Nexus)
        env:
          NEXUS_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          echo "${NEXUS_PASSWORD}" | docker login ${NEXUS_REGISTRY} \
            -u ${NEXUS_USERNAME} --password-stdin

      - name: Build & Push Docker Image
        env:
          NEXUS_REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
          NEXUS_DOCKER_REPO: ${{ secrets.NEXUS_DOCKER_REPO }}
        run: |
          IMAGE=${NEXUS_REGISTRY}/${NEXUS_DOCKER_REPO}/tomcat
          TAG=${GITHUB_SHA}

          docker build -t ${IMAGE}:${TAG} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest
